<!DOCTYPE html>
<html>
<head>
  <style>
    body { background: #7f1d1d; color: white; font-family: 'Segoe UI', sans-serif; text-align: center; padding-top: 80px; }
    .container { border: 2px solid #ef4444; display: inline-block; padding: 40px; border-radius: 15px; background: #991b1b; max-width: 500px; }
    .btns { margin-top: 30px; }
    .safe-btn { background: white; color: #7f1d1d; border: none; padding: 12px 24px; border-radius: 5px; cursor: pointer; font-weight: bold; font-size: 16px; }
    .risk-link { display: block; margin-top: 20px; color: #fca5a5; font-size: 12px; text-decoration: underline; cursor: pointer; background: none; border: none; width: 100%; }
  </style>
</head>
<body>
    <div class="container">
  <h1 id="mainTitle">🛑 SECURITY WARNING</h1>
  <p id="reasonText">PhishShield has blocked this page for your safety.</p>
    
    <div class="btns">
      <button class="safe-btn" onclick="window.history.back()">Back to Safety</button>
      <button id="proceedBtn" class="risk-link">I understand the risks, proceed anyway</button>
    </div>
  </div>
  <script src="blocked.js"></script>
</body>
</html>
